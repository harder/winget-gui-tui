name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs on new pushes to the same branch (saves runner time).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@v1

  build-and-test:
    needs: workflow-lint
    # Windows only — winget itself is Windows-only and Native AOT can't cross-OS publish
    # to win-* targets from Linux. Tests CAN run on Linux but only verify pure-data parser
    # logic, not the full deploy story. Stick to where the real builds happen.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'
          cache: true
          cache-dependency-path: |
            WingetTui.csproj
            tests/WingetTui.Tests.csproj

      - name: Compute CI build version
        id: version
        shell: bash
        run: |
          VERSION_PREFIX="$(grep -oPm1 '(?<=<Version>)[^<]+' WingetTui.csproj)"
          CI_VERSION="${VERSION_PREFIX}-ci.${GITHUB_RUN_NUMBER}+sha.${GITHUB_SHA::7}"
          echo "ci_version=$CI_VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore tests/WingetTui.Tests.csproj

      - name: Build
        run: >
          dotnet build tests/WingetTui.Tests.csproj
          --no-restore
          --configuration Release
          /p:Version=${{ steps.version.outputs.ci_version }}
          /p:InformationalVersion=${{ steps.version.outputs.ci_version }}

      - name: Test
        run: dotnet test tests/WingetTui.Tests.csproj --no-build --configuration Release --verbosity normal

      # Mock-backend smoke: launch the binary with --mock for a couple seconds and verify
      # it exits cleanly (no stderr output, no crash). Catches regressions that compile
      # cleanly but blow up at startup.
      - name: Mock-run smoke
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dotnet" -ArgumentList "bin/Release/net10.0/winget-tui-gui.dll", "--mock" -PassThru -RedirectStandardError err.log
          Start-Sleep -Seconds 2
          if (!$proc.HasExited) { Stop-Process -Id $proc.Id -Force }
          if ((Get-Item err.log).Length -gt 0) {
            Write-Host "::error::Mock run produced stderr output"
            Get-Content err.log
            exit 1
          }

      - name: Upload CI build outputs
        uses: actions/upload-artifact@v4
        with:
          name: winget-tui-gui-${{ steps.version.outputs.ci_version }}-win-build
          path: |
            bin/Release/net10.0/**
            tests/bin/Release/net10.0/**
          retention-days: 7
