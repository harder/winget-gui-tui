name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs on new pushes to the same branch (saves runner time).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Windows only — winget itself is Windows-only and Native AOT can't cross-OS publish
    # to win-* targets from Linux. Tests CAN run on Linux but only verify pure-data parser
    # logic, not the full deploy story. Stick to where the real builds happen.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/WingetTui.Tests.csproj --no-build --configuration Release --verbosity normal

      # Mock-backend smoke: launch the binary with --mock for a couple seconds and verify
      # it exits cleanly (no stderr output, no crash). Catches regressions that compile
      # cleanly but blow up at startup.
      - name: Mock-run smoke
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dotnet" -ArgumentList "bin/Release/net10.0/winget-tui-gui.dll", "--mock" -PassThru -RedirectStandardError err.log
          Start-Sleep -Seconds 2
          if (!$proc.HasExited) { Stop-Process -Id $proc.Id -Force }
          if ((Get-Item err.log).Length -gt 0) {
            Write-Host "::error::Mock run produced stderr output"
            Get-Content err.log
            exit 1
          }
